="1030" y2="402" stroke="#d5d8dd" stroke-width="1"/><line x1="700" y1="436" x2="1030" y2="436" stroke="#d5d8dd" stroke-width="1"/><line x1="845" y1="130" x2="845" y2="470" stroke="#d5d8dd" stroke-width="1"/><line x1="937" y1="130" x2="937" y2="470" stroke="#d5d8dd" stroke-width="1"/><text x="772" y="153" font-size="15" fill="#1f2329" text-anchor="middle"> </text><text x="891" y="153" font-size="16" fill="#2a78d6" text-anchor="middle" font-weight="bold">a</text><text x="983" y="153" font-size="16" fill="#c98500" text-anchor="middle" font-weight="bold">b</text><text x="712" y="187" font-size="15" fill="#1f2329">L1 任务</text><text x="891" y="187" font-size="15" fill="#1f2329" text-anchor="middle">4.7</text><text x="983" y="187" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">3.7</text><text x="712" y="221" font-size="15" fill="#1f2329">L2 视觉</text><text x="891" y="221" font-size="15" fill="#1f2329" text-anchor="middle">4.2</text><text x="983" y="221" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">2.8</text><text x="712" y="255" font-size="15" fill="#1f2329">L3 时序</text><text x="891" y="255" font-size="15" fill="#1f2329" text-anchor="middle">4.2</text><text x="983" y="255" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">2.5</text><text x="712" y="289" font-size="15" fill="#1f2329">L4 音频</text><text x="891" y="289" font-size="15" fill="#1f2329" text-anchor="middle">4.5</text><text x="983" y="289" font-size="15" fill="#1f2329" text-anchor="middle">4.0</text><text x="712" y="323" font-size="15" fill="#1f2329">L5 叙事</text><text x="891" y="323" font-size="15" fill="#1f2329" text-anchor="middle">4.0</text><text x="983" y="323" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">3.0</text><text x="712" y="357" font-size="15" fill="#1f2329">L6 商业</text><text x="891" y="357" font-size="15" fill="#1f2329" text-anchor="middle">4.3</text><text x="983" y="357" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">3.5</text><text x="712" y="391" font-size="15" fill="#1f2329">均分</text><text x="891" y="391" font-size="15" fill="#1f2329" text-anchor="middle">4.33</text><text x="983" y="391" font-size="15" fill="#c0392b" text-anchor="middle" font-weight="bold">3.24</text><text x="712" y="425" font-size="15" fill="#1f2329">档位</text><text x="891" y="425" font-size="15" fill="#1f2329" text-anchor="middle">及格</text><text x="983" y="425" font-size="15" fill="#1f2329" text-anchor="middle">及格</text><text x="712" y="459" font-size="15" fill="#1f2329">Gate</text><text x="891" y="459" font-size="15" fill="#1f2329" text-anchor="middle">通过</text><text x="983" y="459" font-size="15" fill="#1f2329" text-anchor="middle">通过</text><text x="1090" y="160" font-size="16" fill="#2a78d6" font-weight="bold">a 诊断</text><text x="1090" y="186" font-size="13.5" fill="#646a73">这是一条学术严谨、逻辑清晰的电池热</text><text x="1090" y="207" font-size="13.5" fill="#646a73">蔓延科普视频，数据引用详实，但受限</text><text x="1090" y="228" font-size="13.5" fill="#646a73">于较为单一的“PPT式”静态图表转</text><text x="1090" y="249" font-size="13.5" fill="#646a73">场，视觉动效和叙事节奏略显沉闷。</text><text x="1090" y="288" font-size="16" fill="#c98500" font-weight="bold">b 诊断</text><text x="1090" y="314" font-size="13.5" fill="#646a73">视频科普逻辑清晰，但视觉上PPT模</text><text x="1090" y="335" font-size="13.5" fill="#646a73">板感极强，存在多处严重的动画错位、</text><text x="1090" y="356" font-size="13.5" fill="#646a73">叠压和空白面板Bug，且未更新20</text><text x="1090" y="377" font-size="13.5" fill="#646a73">26年实施的防热扩散新国标，时效性</text><text x="1090" y="398" font-size="13.5" fill="#646a73">与制作精细度均需返工。</text></svg>